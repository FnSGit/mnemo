[project]
name = "sentence-reranker"
version = "1.0.0"
description = "Cross-Encoder Reranker Service for Mnemo"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.100.0",
    "uvicorn>=0.22.0",
    "sentence-transformers>=2.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"